[pytest]
# -ra: always show short summary for (s)kipped, x(failed), e(rror) etc.
# -v : verbose per-test status (so silent skips no longer look like nothing).
# -p no:cacheprovider: don't pollute the directory with .pytest_cache.
# log_cli: stream test logs / prints in real time so a slow JIT compile is visible.
addopts = -ra -v
log_cli = true
log_cli_level = INFO
